<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
    }
    #terminal {
      height: 100vh;
      padding: 16px;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-y: auto;
    }
    .error { color: #f48771; }
    .info { color: #4fc1ff; }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script>
    let outputBuffer = '';

    window.appendOutput = function(text, isError, isInfo) {
      const cssClass = isError ? 'error' : (isInfo ? 'info' : '');
      outputBuffer += '<span class="' + cssClass + '">' + escapeHtml(text) + '</span>';
      document.getElementById('terminal').innerHTML = outputBuffer;
      document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
    };

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // Initial message
    window.appendOutput('Starting EdgeClaw...\n', false, true);
  </script>
</body>
</html>
